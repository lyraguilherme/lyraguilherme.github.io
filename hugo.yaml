baseURL: https://guilhermelyra.com
title: "Guilherme Lyra"

theme: ["congo"]
enableRobotsTXT: true
defaultContentLanguage: en

summaryLength: 30

pagination:
  pagerSize: 5

outputs:
  home:
    - HTML
    - RSS
    - JSON

privacy:
  vimeo:
    enableDNT: true
  x:
    enableDNT: true
  youTube:
    privacyEnhanced: true

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true

params:
  colorScheme: "custom"
  defaultAppearance: "dark"
  autoSwitchAppearance: true
  enableSearch: true
  enableCodeCopy: true
  enableImageLazyLoading: true
  enableImageWebp: true

  header:
    layout: "basic"
    showTitle: true

  footer:
    showCopyright: true
    showThemeAttribution: false
    showAppearanceSwitcher: false
    showScrollToTop: true

  homepage:
    layout: "profile"
    showRecent: true
    recentLimit: 5

  article:
    showDate: true
    showDateUpdated: false
    showAuthor: true
    showBreadcrumbs: true
    showDraftLabel: true
    showHeadingAnchors: true
    showPagination: true
    showReadingTime: true
    showTableOfContents: false
    showTaxonomies: true
    showWordCount: false
    showComments: false

  list:
    showBreadcrumbs: true
    showSummary: true
    showTableOfContents: false
    showTaxonomies: true
    groupByYear: true

  taxonomy:
    showTermCount: true

languages:
  en:
    disabled: false
    languageName: "English"
    languageCode: en-US
    languageDirection: ltr
    weight: 10
    title: "Guilherme Lyra"
    params:
      dateFormat: "2 January 2006"
      mainSections: ["posts"]
      description: "Personal blog of Guilherme Lyra, CCIE #66666 covering networking, automation, and technology."
      author:
        name: "Guilherme Lyra"
        headline: "CCIE #66666"
        bio: "Welcome to my blog about networking, automation and technology-related stuff."
        links:
          - linkedin: "https://linkedin.com/in/guilhermelv"
          - github: "https://github.com/lyraguilherme"
    menu:
      main:
        - identifier: home
          name: "Home"
          pageRef: "/"
          weight: 5
        - identifier: posts
          name: "All Posts"
          pageRef: "posts"
          weight: 10
        - identifier: tags
          name: "Tags"
          pageRef: "tags"
          weight: 20
        - identifier: appearance
          name: ""
          weight: 98
          params:
            action: appearance
        - identifier: search
          name: ""
          weight: 99
          params:
            action: search
        - identifier: locale
          name: ""
          weight: 100
          params:
            action: locale

  pt-br:
    disabled: false
    languageName: "Português"
    languageCode: pt-BR
    languageDirection: ltr
    weight: 20
    title: "Guilherme Lyra"
    params:
      dateFormat: "2 January 2006"
      mainSections: ["posts"]
      description: "Blog pessoal de Guilherme Lyra, CCIE #66666 sobre redes, automação e tecnologia."
      author:
        name: "Guilherme Lyra"
        headline: "CCIE #66666"
        bio: "Bem-vindo ao meu blog sobre redes, automação e tecnologia."
        links:
          - linkedin: "https://linkedin.com/in/guilhermelv"
          - github: "https://github.com/lyraguilherme"
    menu:
      main:
        - identifier: home
          name: "Home"
          pageRef: "/"
          weight: 5
        - identifier: posts
          name: "Posts"
          pageRef: "posts"
          weight: 10
        - identifier: tags
          name: "Tags"
          pageRef: "tags"
          weight: 20
        - identifier: appearance
          name: ""
          weight: 98
          params:
            action: appearance
        - identifier: search
          name: ""
          weight: 99
          params:
            action: search
        - identifier: locale
          name: ""
          weight: 100
          params:
            action: locale

module:
  mounts:
    - source: static
      target: static
